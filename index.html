<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0c0c0c">
<title>Yasukura Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0c0c0c;
  --bg2:#161616;
  --bg3:#1e1e1e;
  --bg4:#262626;
  --bg5:#2e2e2e;
  --text:#f2efe9;
  --text2:#a09990;
  --text3:#5a5248;
  --border:#252525;
  --border2:#333;
  --border3:#444;
  --vn:#e8622a;
  --vn2:#f97316;
  --vn-bg:#1a0e06;
  --vn-border:#3d1a08;
  --jp:#3b82f6;
  --jp2:#60a5fa;
  --jp-bg:#060f1f;
  --jp-border:#1e3357;
  --green:#22c55e;
  --green-bg:#052010;
  --amber:#f59e0b;
  --red:#ef4444;
  --red-bg:#1a0505;
  --r:10px;
  --r-lg:16px;
  --r-xl:22px;
}
html{background:var(--bg);overflow-x:hidden;}
body{
  font-family:'Noto Sans JP',sans-serif;
  color:var(--text);
  min-height:100dvh;
  background:var(--bg);
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}

/* ── LAYOUT ── */
.app{
  max-width:480px;
  margin:0 auto;
  min-height:100dvh;
  display:flex;
  flex-direction:column;
  position:relative;
}

/* ── HEADER ── */
.hdr{
  padding:calc(env(safe-area-inset-top,0px) + 14px) 18px 0;
  position:sticky;
  top:0;
  z-index:50;
  background:var(--bg);
}
.hdr-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:14px;
}
.logo{
  font-family:'DM Mono',monospace;
  font-size:11px;
  font-weight:500;
  color:var(--text3);
  letter-spacing:0.12em;
  text-transform:uppercase;
}
.date-pill{
  font-family:'DM Mono',monospace;
  font-size:11px;
  color:var(--text3);
  background:var(--bg3);
  border:1px solid var(--border);
  padding:4px 10px;
  border-radius:99px;
  transition:color 0.2s;
}

/* ── CHANNEL TABS ── */
.tabs{
  display:flex;
  gap:6px;
  padding-bottom:14px;
  border-bottom:1px solid var(--border);
}
.tab{
  flex:1;
  padding:10px 10px 9px;
  border-radius:var(--r);
  border:1px solid var(--border);
  background:var(--bg2);
  color:var(--text3);
  font-family:'Noto Sans JP',sans-serif;
  font-size:11.5px;
  font-weight:400;
  cursor:pointer;
  transition:all 0.18s;
  text-align:center;
  line-height:1.35;
}
.tab small{
  display:block;
  font-size:9.5px;
  color:var(--text3);
  margin-top:2px;
  transition:color 0.18s;
}
.tab.vn-on{
  background:var(--vn-bg);
  border-color:var(--vn-border);
  color:var(--vn2);
  font-weight:500;
}
.tab.vn-on small{color:rgba(249,115,22,0.5);}
.tab.jp-on{
  background:var(--jp-bg);
  border-color:var(--jp-border);
  color:var(--jp2);
  font-weight:500;
}
.tab.jp-on small{color:rgba(96,165,250,0.5);}

/* ── SCROLL BODY ── */
.body{
  flex:1;
  overflow-y:auto;
  padding:0 16px 120px;
  -webkit-overflow-scrolling:touch;
}
.panel{display:none;}
.panel.on{display:block;}

/* ── GENERATE BUTTON ── */
.gen-wrap{padding:18px 0 12px;}
.gen-btn{
  width:100%;
  padding:17px 20px;
  border-radius:var(--r-lg);
  border:1px solid var(--border2);
  background:var(--bg3);
  color:var(--text);
  font-family:'Noto Sans JP',sans-serif;
  font-size:14px;
  font-weight:500;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:all 0.18s;
  position:relative;
  overflow:hidden;
  letter-spacing:0.01em;
}
.gen-btn::before{
  content:'';position:absolute;inset:0;opacity:0;
  transition:opacity 0.18s;
}
.gen-btn:hover::before{opacity:1;}
.gen-btn:active{transform:scale(0.98);}
.gen-btn.vn-mode{border-color:var(--vn-border);background:var(--vn-bg);}
.gen-btn.vn-mode:hover{border-color:var(--vn);background:var(--vn-bg);}
.gen-btn.jp-mode{border-color:var(--jp-border);background:var(--jp-bg);}
.gen-btn.jp-mode:hover{border-color:var(--jp);background:var(--jp-bg);}
.gen-btn.busy{pointer-events:none;opacity:0.7;}
.gen-sub{
  text-align:center;
  font-size:11px;
  color:var(--text3);
  margin-top:8px;
  font-family:'DM Mono',monospace;
}

/* ── STATUS ── */
.status{
  display:flex;align-items:center;gap:8px;
  padding:10px 12px;
  border-radius:var(--r);
  background:var(--bg3);
  border:1px solid var(--border);
  margin-bottom:14px;
  font-size:11.5px;
  color:var(--text2);
  font-family:'DM Mono',monospace;
}
.sdot{
  width:7px;height:7px;border-radius:50%;
  background:var(--text3);flex-shrink:0;
}
.sdot.ok{background:var(--green);}
.sdot.spin{background:var(--amber);animation:pulse 1.4s infinite;}
.sdot.err{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* ── NETA CARDS ── */
.cards{display:flex;flex-direction:column;gap:10px;}

.card{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:var(--r-lg);
  overflow:hidden;
  transition:border-color 0.15s,opacity 0.2s;
}
.card:hover{border-color:var(--border2);}
.card.expanded{border-color:var(--border3);}
.card.used{opacity:0.38;}
.card.used .card-head{cursor:default;}

/* stagger */
.card:nth-child(1){animation:up 0.32s 0.04s both;}
.card:nth-child(2){animation:up 0.32s 0.10s both;}
.card:nth-child(3){animation:up 0.32s 0.16s both;}
.card:nth-child(4){animation:up 0.32s 0.22s both;}
.card:nth-child(5){animation:up 0.32s 0.28s both;}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

.card-head{
  padding:13px 15px;
  cursor:pointer;
  display:flex;gap:10px;align-items:flex-start;
}
.card-meta{flex:1;min-width:0;}
.badge-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:6px;}
.badge{
  font-size:9.5px;padding:2px 8px;border-radius:99px;
  font-weight:500;white-space:nowrap;border:1px solid transparent;
}
.c-pol{background:#1c0808;color:#fca5a5;border-color:#7f1d1d;}
.c-biz{background:#06101f;color:#93c5fd;border-color:#1e3a5f;}
.c-soc{background:#03180f;color:#86efac;border-color:#14532d;}
.c-trn{background:#1c1200;color:#fcd34d;border-color:#78350f;}
.c-gos{background:#1a0610;color:#f9a8d4;border-color:#831843;}
.c-ene{background:#1a0d00;color:#fdba74;border-color:#7c2d12;}
.c-tec{background:#0d0a2a;color:#c4b5fd;border-color:#4c1d95;}
.flag-new{
  font-size:9px;font-family:'DM Mono',monospace;font-weight:500;
  background:var(--green-bg);color:var(--green);
  padding:2px 6px;border-radius:4px;
}
.flag-hot{
  font-size:9px;font-family:'DM Mono',monospace;font-weight:500;
  background:var(--red-bg);color:#fca5a5;
  padding:2px 6px;border-radius:4px;
}
.flag-used{
  font-size:9px;font-family:'DM Mono',monospace;
  background:var(--bg4);color:var(--text3);
  padding:2px 6px;border-radius:4px;
}
.card-title{
  font-size:13px;font-weight:500;
  color:var(--text);line-height:1.5;
}
.chev{
  font-size:10px;color:var(--text3);
  margin-top:3px;flex-shrink:0;
  transition:transform 0.15s;
}
.card.expanded .chev{transform:rotate(180deg);}

/* ── CARD BODY ── */
.card-body{
  display:none;
  border-top:1px solid var(--border);
  padding:14px 15px;
}
.card.expanded .card-body{display:block;}

.sec{
  font-size:9px;font-weight:500;
  font-family:'DM Mono',monospace;
  letter-spacing:0.1em;text-transform:uppercase;
  color:var(--text3);
  margin-bottom:6px;margin-top:12px;
}
.sec:first-child{margin-top:0;}

.title-list{display:flex;flex-direction:column;gap:5px;}
.title-item{
  font-size:12px;color:var(--text);
  background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--r);padding:7px 10px;line-height:1.45;
}

.thumb-box{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--r);padding:10px 12px;
}
.thumb-main{
  font-size:13px;font-weight:500;color:var(--text);margin-bottom:3px;
}
.thumb-sub{font-size:11px;color:var(--text2);line-height:1.5;}

.steps{display:flex;flex-direction:column;gap:5px;}
.step{display:flex;gap:9px;align-items:flex-start;}
.snum{
  font-size:10px;font-weight:500;font-family:'DM Mono',monospace;
  color:var(--text3);background:var(--bg4);
  border-radius:50%;width:18px;height:18px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:1px;
}
.stxt{font-size:12px;color:var(--text2);line-height:1.55;}

.src-row{
  font-size:10px;color:var(--text3);
  font-family:'DM Mono',monospace;
  padding-top:9px;margin-top:9px;
  border-top:1px solid var(--border);
}

.act-row{
  display:flex;gap:6px;flex-wrap:wrap;
  margin-top:12px;
}
.act-btn{
  font-size:11px;padding:7px 11px;
  border-radius:var(--r);border:1px solid var(--border2);
  background:var(--bg3);color:var(--text2);
  cursor:pointer;font-family:'Noto Sans JP',sans-serif;
  transition:all 0.15s;white-space:nowrap;
}
.act-btn:hover{background:var(--bg4);color:var(--text);}
.act-btn:active{transform:scale(0.96);}
.act-btn.pri{
  border-color:var(--vn-border);
  color:var(--vn2);background:var(--vn-bg);
}
.act-btn.pri.jp{
  border-color:var(--jp-border);
  color:var(--jp2);background:var(--jp-bg);
}
.act-btn.pri:hover{opacity:0.85;}
.use-btn{
  font-size:10px;padding:6px 10px;
  border-radius:var(--r);border:1px solid var(--border);
  background:transparent;color:var(--text3);
  cursor:pointer;font-family:'DM Mono',monospace;
  transition:all 0.15s;margin-left:auto;
}
.use-btn:hover{color:var(--green);border-color:var(--green);}
.use-btn.done{color:var(--green);border-color:#14532d;background:var(--green-bg);}

/* ── HISTORY ── */
.hist-section{
  margin-top:22px;padding-top:16px;
  border-top:1px solid var(--border);
}
.hist-hd{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:10px;
}
.hist-label{
  font-size:10px;font-family:'DM Mono',monospace;
  color:var(--text3);letter-spacing:0.06em;
}
.hist-clear{
  font-size:10px;color:var(--text3);
  background:none;border:none;cursor:pointer;
  font-family:'DM Mono',monospace;
  padding:2px 6px;border-radius:4px;
  transition:color 0.15s;
}
.hist-clear:hover{color:var(--red);}
.hist-list{display:flex;flex-direction:column;gap:6px;}
.hist-item{
  padding:9px 12px;border-radius:var(--r);
  background:var(--bg2);border:1px solid var(--border);
  cursor:pointer;transition:border-color 0.15s;
}
.hist-item:hover{border-color:var(--border2);}
.hist-top{
  display:flex;align-items:center;gap:7px;margin-bottom:4px;
}
.hist-dot{
  width:6px;height:6px;border-radius:50%;flex-shrink:0;
}
.hist-dot.vn{background:var(--vn);}
.hist-dot.jp{background:var(--jp);}
.hist-date{
  font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);
}
.hist-count{
  font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);
  margin-left:auto;
}
.hist-headlines{
  font-size:11px;color:var(--text3);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  line-height:1.4;
}

/* ── EMPTY STATE ── */
.empty{
  padding:52px 20px;
  display:flex;flex-direction:column;
  align-items:center;gap:12px;text-align:center;
}
.empty-icon{font-size:44px;opacity:0.15;}
.empty-ttl{font-size:15px;color:var(--text2);font-weight:500;}
.empty-sub{font-size:12px;color:var(--text3);line-height:1.7;max-width:280px;}

/* ── LOADING SKELETON ── */
.skeleton{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--r-lg);padding:14px 15px;
  animation:shimmer 1.4s infinite;
}
.sk-line{
  height:11px;border-radius:4px;background:var(--bg4);margin-bottom:8px;
}
.sk-line.w80{width:80%;}
.sk-line.w60{width:60%;}
.sk-line.w90{width:90%;}
@keyframes shimmer{0%,100%{opacity:1}50%{opacity:0.5}}

/* ── DOTS LOADER ── */
.dots{display:inline-flex;gap:4px;align-items:center;}
.dots span{
  width:5px;height:5px;border-radius:50%;
  background:currentColor;animation:bounce 1.1s infinite;
  display:inline-block;
}
.dots span:nth-child(2){animation-delay:0.15s;}
.dots span:nth-child(3){animation-delay:0.3s;}
@keyframes bounce{0%,60%,100%{transform:none}30%{transform:translateY(-5px)}}

/* ── BOTTOM BAR ── */
.btm{
  position:fixed;bottom:0;left:0;right:0;
  max-width:480px;margin:0 auto;
  padding:10px 14px calc(10px + env(safe-area-inset-bottom,0));
  background:linear-gradient(to top,var(--bg) 70%,transparent);
  display:flex;gap:6px;z-index:40;
}
.btm-btn{
  flex:1;padding:10px 6px;
  border-radius:var(--r);border:1px solid var(--border);
  background:var(--bg2);color:var(--text2);
  font-family:'Noto Sans JP',sans-serif;font-size:10.5px;
  cursor:pointer;transition:all 0.15s;text-align:center;
}
.btm-btn:hover{background:var(--bg3);color:var(--text);}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  background:var(--bg4);border:1px solid var(--border3);
  color:var(--text2);font-size:12px;font-family:'DM Mono',monospace;
  padding:9px 18px;border-radius:99px;
  opacity:0;transition:opacity 0.2s;
  pointer-events:none;white-space:nowrap;z-index:999;
}
.toast.show{opacity:1;}
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-top">
      <div class="logo">Yasukura Studio</div>
      <div class="date-pill" id="date-pill">—</div>
    </div>
    <div class="tabs">
      <button class="tab vn-on" id="tab-vn" onclick="switchCh('vn')">
        やすくら社長
        <small>日本人向けベトナム解説</small>
      </button>
      <button class="tab" id="tab-jp" onclick="switchCh('jp')">
        Giam Doc Yasukura
        <small>ベトナム人向け日本解説</small>
      </button>
    </div>
  </div>

  <!-- BODY -->
  <div class="body">

    <!-- VN Panel -->
    <div class="panel on" id="panel-vn">
      <div class="gen-wrap">
        <button class="gen-btn vn-mode" id="genbtn-vn" onclick="generate('vn')">
          <span>🔄</span><span>今日のネタを提案する</span>
        </button>
        <div class="gen-sub" id="gensub-vn">ベトナム最新ニュースを検索 → 5本を自動生成</div>
      </div>
      <div id="st-vn"></div>
      <div id="cards-vn" class="cards"></div>
      <div id="hist-vn"></div>
    </div>

    <!-- JP Panel -->
    <div class="panel" id="panel-jp">
      <div class="gen-wrap">
        <button class="gen-btn jp-mode" id="genbtn-jp" onclick="generate('jp')">
          <span>🔄</span><span>今日のネタを提案する</span>
        </button>
        <div class="gen-sub" id="gensub-jp">日本最新ニュースを検索 → 5本を自動生成</div>
      </div>
      <div id="st-jp"></div>
      <div id="cards-jp" class="cards"></div>
      <div id="hist-jp"></div>
    </div>

  </div>

  <!-- BOTTOM BAR -->
  <div class="btm">
    <button class="btm-btn" onclick="resetCards()">🗑 リセット</button>
    <button class="btm-btn" onclick="openWeekly()">📅 週間カレンダー ↗</button>
    <button class="btm-btn" onclick="openBoth()">⚡ 両方まとめて ↗</button>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
/* ───── STATE ───── */
const TODAY = new Date();
const WD = ['日','月','火','水','木','金','土'];
const dateStr = `${TODAY.getFullYear()}年${TODAY.getMonth()+1}月${TODAY.getDate()}日（${WD[TODAY.getDay()]}）`;
const dateShort = `${TODAY.getMonth()+1}/${TODAY.getDate()}（${WD[TODAY.getDay()]}）`;
document.getElementById('date-pill').textContent = dateShort;

let currentCh = 'vn';
let cardsData = { vn: [], jp: [] };
// localStorage keys
const HIST_KEY = 'ys_hist_v2';
const USED_KEY = 'ys_used_v2';
let history = JSON.parse(localStorage.getItem(HIST_KEY) || '[]');
let usedSet = new Set(JSON.parse(localStorage.getItem(USED_KEY) || '[]'));

function saveHistory() { localStorage.setItem(HIST_KEY, JSON.stringify(history)); }
function saveUsed()    { localStorage.setItem(USED_KEY, JSON.stringify([...usedSet])); }

/* ───── TAB ───── */
function switchCh(ch) {
  currentCh = ch;
  document.getElementById('panel-vn').className = 'panel' + (ch==='vn'?' on':'');
  document.getElementById('panel-jp').className = 'panel' + (ch==='jp'?' on':'');
  document.getElementById('tab-vn').className = 'tab' + (ch==='vn'?' vn-on':'');
  document.getElementById('tab-jp').className = 'tab' + (ch==='jp'?' jp-on':'');
  renderHistory(ch);
}

/* ───── STATUS ───── */
function setStatus(ch, type, msg) {
  const el = document.getElementById('st-'+ch);
  if (!msg) { el.innerHTML=''; return; }
  const cls = {ok:'ok', spin:'spin', err:'err'}[type] || '';
  const loader = type==='spin' ? ' <span class="dots"><span></span><span></span><span></span></span>' : '';
  el.innerHTML = `<div class="status"><div class="sdot ${cls}"></div><span>${msg}${loader}</span></div>`;
}

/* ───── GENERATE ───── */
async function generate(ch) {
  const btn = document.getElementById('genbtn-'+ch);
  const sub = document.getElementById('gensub-'+ch);
  const isVN = ch === 'vn';

  btn.classList.add('busy');
  btn.innerHTML = `<span class="dots"><span></span><span></span><span></span></span>`;
  setStatus(ch, 'spin', 'ニュースを検索・生成中...');
  document.getElementById('cards-'+ch).innerHTML = renderSkeletons();

  const systemP = isVN
    ? `あなたはやすくら社長チャンネル（日本人向けベトナム解説YouTube）のコンテンツプロデューサーです。
ベトナムの最新ニュースをweb_searchで検索し、今日の動画ネタを5本提案します。
必ずJSON形式のみで返してください。説明文・マークダウン・コードブロックは不要です。`
    : `あなたはGiam Doc Yasukuraチャンネル（ベトナム人向け日本解説YouTube）のコンテンツプロデューサーです。
日本の最新ニュースをweb_searchで検索し、ベトナム人視聴者向けの動画ネタを5本提案します。台本構成は日本語で書いてください。
必ずJSON形式のみで返してください。説明文・マークダウン・コードブロックは不要です。`;

  const userP = `今日は${dateStr}です。
${isVN ? 'ベトナム' : '日本'}の本日・今週の最新ニュースをweb_searchで検索して、動画ネタを5本提案してください。

以下のJSONフォーマットで返してください:
{
  "items": [
    {
      "id": 1,
      "category": "カテゴリ（例：政治、ビジネス、社会、観光、テック）",
      "categoryKey": "pol または biz または soc または trn または gos または ene または tec",
      "isBreaking": true または false,
      "headline": "ネタのヘッドライン（25字以内）",
      "titles": ["タイトル案1（30字程度）", "タイトル案2", "タイトル案3"],
      "thumbnail": {
        "main": "サムネイルのメインコピー（15字以内）",
        "sub": "構成の説明（写真・テキスト・演出）"
      },
      "steps": [
        "①冒頭フック：具体的な内容",
        "②本編前半：具体的な内容",
        "③本編中盤：具体的な内容",
        "④本編後半：具体的な内容",
        "⑤まとめ＆CTA：具体的な内容"
      ],
      "source": "ソース名 / YYYY.MM.DD"
    }
  ]
}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemP,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        messages: [{ role: 'user', content: userP }]
      })
    });

    const data = await res.json();
    let rawText = (data.content || []).filter(b=>b.type==='text').map(b=>b.text).join('');
    const m = rawText.match(/\{[\s\S]*\}/);
    if (!m) throw new Error('no json');
    const parsed = JSON.parse(m[0]);
    cardsData[ch] = (parsed.items || []).slice(0, 5);

    // 履歴保存
    history.unshift({
      ch, date: dateStr, ts: Date.now(),
      count: cardsData[ch].length,
      headlines: cardsData[ch].map(i=>i.headline)
    });
    if (history.length > 20) history = history.slice(0, 20);
    saveHistory();

    setStatus(ch, 'ok', `${cardsData[ch].length}本を生成しました — ${dateShort}`);
    renderCards(ch);
    renderHistory(ch);

  } catch(e) {
    console.error(e);
    // フォールバック: サンプルデータ
    cardsData[ch] = sampleData(ch);
    setStatus(ch, 'err', 'API接続エラー — サンプルデータを表示中');
    renderCards(ch);
  }

  btn.classList.remove('busy');
  btn.innerHTML = `<span>🔄</span><span>今日のネタを提案する</span>`;
  sub.textContent = isVN
    ? 'ベトナム最新ニュースを検索 → 5本を自動生成'
    : '日本最新ニュースを検索 → 5本を自動生成';
}

    return `<div class="card${isUsed?' used':''}" id="card-${ch}-${item.id}">
      <div class="card-head" onclick="toggleCard('${ch}',${item.id})">

      </div>
      <div class="card-body">

        <div class="title-list">
          ${item.titles.map(t=>`<div class="title-item">「${t}」</div>`).join('')}
        </div>

          <div class="thumb-main">「${item.thumbnail.main}」</div>
          <div class="thumb-sub">${item.thumbnail.sub}</div>
        </div>

        <div class="steps">

        </div>
        <div class="src-row">📰 ${item.source}</div>

          <button class="act-btn ${priCls}" onclick="openScript('${ch}',${item.id})">台本を生成 ↗</button>
          <button class="act-btn" onclick="openTitles('${ch}',${item.id})">タイトル10案 ↗</button>
          <button class="act-btn" onclick="openThumb('${ch}',${item.id})">サムネ詳細 ↗</button>
          <button class="use-btn${isUsed?' done':''}" onclick="toggleUsed('${ch}',${item.id})" id="usebtn-${ch}-${item.id}">
            ${isUsed ? '✓ 使用済み' : '使用済みにする'}

        </div>

  }).join('');
}

/* ───── CARD TOGGLE ───── */
function toggleCard(ch, id) {
  const el = document.getElementById(`card-${ch}-${id}`);
  if (el.classList.contains('used') && !el.classList.contains('expanded')) return;
  const was = el.classList.contains('expanded');
  document.querySelectorAll('.card.expanded').forEach(c => c.classList.remove('expanded'));
  if (!was) el.classList.add('expanded');
}

/* ───── USED TOGGLE ───── */
function toggleUsed(ch, id) {
  const key = `${ch}_${id}_${dateShort}`;
  const card = document.getElementById(`card-${ch}-${id}`);
  const btn = document.getElementById(`usebtn-${ch}-${id}`);
  if (usedSet.has(key)) {
    usedSet.delete(key);
    card.classList.remove('used');
    btn.className = 'use-btn';
    btn.textContent = '使用済みにする';
    // badge-row から used-flag 削除
    const br = card.querySelector('.badge-row');
    const uf = br.querySelector('.flag-used');
    if (uf) uf.remove();
    showToast('使用済みを解除しました');
  } else {
    usedSet.add(key);
    card.classList.add('used');
    btn.className = 'use-btn done';
    btn.textContent = '✓ 使用済み';
    const br = card.querySelector('.badge-row');
    if (!br.querySelector('.flag-used')) {
      const sp = document.createElement('span');
      sp.className = 'flag-used';
      sp.textContent = '✓ 使用済み';
      br.appendChild(sp);
    }
    showToast('使用済みにしました');
  }
  saveUsed();
}

/* ───── HISTORY ───── */
function renderHistory(ch) {
  const el = document.getElementById('hist-'+ch);
  const items = history.filter(h=>h.ch===ch).slice(0, 7);
  if (!items.length) { el.innerHTML=''; return; }

  el.innerHTML = `<div class="hist-section">
    <div class="hist-hd">
      <div class="hist-label">過去の提案履歴</div>
      <button class="hist-clear" onclick="clearHistory('${ch}')">履歴を削除</button>
    </div>
    <div class="hist-list">
      ${items.map((h,idx)=>`
        <div class="hist-item" onclick="restoreHistory(${idx},'${ch}')">
          <div class="hist-top">
            <div class="hist-dot ${h.ch}"></div>
            <div class="hist-date">${h.date}</div>
            <div class="hist-count">${h.count}本</div>
          </div>
          <div class="hist-headlines">${h.headlines.join(' · ')}</div>
        </div>`).join('')}
    </div>
  </div>`;
}

function clearHistory(ch) {
  history = history.filter(h=>h.ch!==ch);
  saveHistory();
  renderHistory(ch);
  showToast('履歴を削除しました');
}

function restoreHistory(idx, ch) {
  showToast('再生成するには「今日のネタを提案する」を押してください');
}
